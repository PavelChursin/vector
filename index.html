<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Векторизатор Печатей v3</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        .drop-zone { border: 2px dashed #007bff; padding: 30px; border-radius: 8px; margin-bottom: 20px; cursor: pointer; background: #f8f9fa; }
        .drop-zone:hover { background: #e9ecef; }
        .controls { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 14px; }
        input[type="range"] { width: 100%; cursor: pointer; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #btn-process { background: #007bff; color: white; }
        #btn-download { background: #28a745; color: white; display: none; }
        #preview { margin-top: 20px; border: 1px solid #ddd; padding: 10px; min-height: 150px; background: #fff; }
        svg { max-width: 100%; height: auto; }
        .error-log { color: red; font-size: 12px; margin-top: 10px; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <h2>PNG → SVG для печатей</h2>
    
    <div class="drop-zone" id="drop-zone">Нажмите или перетащите PNG</div>
    <input type="file" id="file-input" accept="image/png, image/jpeg" style="display: none;">

    <div class="controls">
        <label>Сглаживание линий: <span id="val-alpha">1.0</span></label>
        <input type="range" id="input-alpha" min="0" max="130" value="100">
        
        <label>Удаление мелких точек: <span id="val-turd">2</span></label>
        <input type="range" id="input-turd" min="0" max="50" value="2">
    </div>

    <button id="btn-process">Преобразовать в вектор</button>
    <button id="btn-download">Скачать SVG</button>

    <div id="preview">Результат появится здесь</div>
    <div id="log" class="error-log"></div>
</div>

<!-- Подключаем библиотеку через проверенный источник -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/potrace/1.1.2/potrace.min.js"></script>

<script>
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const btnProcess = document.getElementById('btn-process');
    const btnDownload = document.getElementById('btn-download');
    const preview = document.getElementById('preview');
    const log = document.getElementById('log');

    // Обновление цифр
    document.getElementById('input-alpha').oninput = (e) => document.getElementById('val-alpha').innerText = (e.target.value/100).toFixed(1);
    document.getElementById('input-turd').oninput = (e) => document.getElementById('val-turd').innerText = e.target.value;

    let currentSVG = "";

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
        if(e.target.files[0]) dropZone.innerText = "Файл выбран: " + e.target.files[0].name;
    };

    btnProcess.onclick = function() {
        const file = fileInput.files[0];
        if (!file) return alert("Выберите файл!");

        const reader = new FileReader();
        reader.readAsDataURL(file);
        
        reader.onload = function(event) {
            try {
                if (typeof Potrace === 'undefined') {
                    throw new Error("Библиотека Potrace не загрузилась. Проверьте интернет.");
                }

                Potrace.loadImageFromUrl(event.target.result);
                Potrace.process(function() {
                    const options = {
                        alphaMax: parseFloat(document.getElementById('input-alpha').value / 100),
                        turdSize: parseInt(document.getElementById('input-turd').value),
                        optCurve: true
                    };
                    
                    // Повторный запуск с параметрами для точности
                    Potrace.process(function() {
                        currentSVG = Potrace.getSVG(1);
                        preview.innerHTML = currentSVG;
                        btnDownload.style.display = "block";
                        log.innerText = ""; // Чистим ошибки
                    }, options);
                });
            } catch (err) {
                log.innerText = "Ошибка: " + err.message;
                console.error(err);
            }
        };
    };

    btnDownload.onclick = function() {
        const blob = new Blob([currentSVG], {type: 'image/svg+xml'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'vector_print.svg';
        a.click();
        URL.revokeObjectURL(url);
    };
</script>

</body>
</html>
