<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Векторизатор для печатей</title>
    <!-- Используем проверенную версию библиотеки через другой CDN -->
    <script src="https://cdn.jsdelivr.net/npm/potrace@1.1.2/dist/potrace.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eceff1; color: #333; line-height: 1.6; padding: 20px; }
        .card { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; color: #2c3e50; margin-bottom: 20px; }
        .upload-area { border: 2px dashed #3498db; padding: 20px; border-radius: 10px; margin-bottom: 20px; cursor: pointer; }
        .params { display: flex; flex-direction: column; gap: 15px; text-align: left; margin-bottom: 20px; }
        input[type="range"] { width: 100%; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #processBtn { background: #3498db; color: white; }
        #processBtn:hover { background: #2980b9; }
        #downloadBtn { background: #27ae60; color: white; display: none; margin-top: 15px; }
        #resultContainer { margin-top: 20px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; background: #fafafa; min-height: 100px; overflow: hidden; }
        svg { max-width: 100%; height: auto; display: block; margin: 0 auto; }
        .loader { display: none; color: #f39c12; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>Конвертер для печатей (PNG → SVG)</h1>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        Нажмите, чтобы выбрать PNG файл
        <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>

    <div class="params">
        <div>
            <label>Удаление мусора (размер пятен): <b id="turdVal">2</b></label>
            <input type="range" id="turdSize" min="0" max="100" value="2">
        </div>
        <div>
            <label>Сглаживание углов: <b id="alphaVal">1.0</b></label>
            <input type="range" id="alphaMax" min="0" max="130" value="100">
        </div>
    </div>

    <button id="processBtn">Обработать и сгладить</button>
    <div id="loader" class="loader">Обработка... подождите</div>
    
    <div id="resultContainer">Тут будет ваш вектор</div>
    
    <button id="downloadBtn">Скачать готовый SVG</button>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const resultContainer = document.getElementById('resultContainer');
    const loader = document.getElementById('loader');

    // Обновление цифр в интерфейсе
    document.getElementById('turdSize').oninput = e => document.getElementById('turdVal').innerText = e.target.value;
    document.getElementById('alphaMax').oninput = e => document.getElementById('alphaVal').innerText = (e.target.value / 100).toFixed(1);

    let lastSvgString = "";

    processBtn.onclick = function() {
        const file = fileInput.files[0];
        if (!file) { alert("Сначала выберите файл!"); return; }

        loader.style.display = "block";
        const reader = new FileReader();

        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                // Пытаемся вызвать Potrace
                try {
                    const options = {
                        turdSize: parseInt(document.getElementById('turdSize').value),
                        alphaMax: parseFloat(document.getElementById('alphaMax').value / 100),
                        optCurve: true
                    };

                    // Важное исправление: работаем через конструктор
                    const potrace = window.Potrace || Potrace;
                    potrace.loadImageFromUrl(e.target.result);
                    potrace.process(function() {
                        const svg = potrace.getSVG(1);
                        lastSvgString = svg;
                        resultContainer.innerHTML = svg;
                        downloadBtn.style.display = "block";
                        loader.style.display = "none";
                    }, options);

                } catch (err) {
                    console.error(err);
                    alert("Ошибка при обработке. Попробуйте другой файл.");
                    loader.style.display = "none";
                }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    };

    downloadBtn.onclick = function() {
        const blob = new Blob([lastSvgString], {type: 'image/svg+xml'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'pechat_pro.svg';
        a.click();
    };
</script>

</body>
</html>
