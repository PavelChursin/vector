<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Fast Vector Pro — Режим реального времени</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 20px; width: 100%; max-width: 850px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); border: 1px solid #333; }
        .upload-zone { border: 2px dashed #0a84ff; padding: 30px; text-align: center; border-radius: 15px; cursor: pointer; background: #252527; margin-bottom: 25px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #2c2c2e; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        label { font-size: 13px; color: #0a84ff; font-weight: bold; margin-bottom: 8px; display: block; }
        input[type="range"] { width: 100%; accent-color: #0a84ff; cursor: pointer; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 18px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 16px; text-transform: uppercase; }
        #btn-process { background: #0a84ff; color: white; }
        #btn-download { background: #30d158; color: black; display: none; }
        #preview { background: #fff; margin-top: 25px; border-radius: 15px; min-height: 400px; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .val { float: right; color: #fff; background: #333; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
        .status { text-align: center; font-size: 12px; margin-top: -15px; margin-bottom: 15px; color: #777; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; margin-top:0;">Vector Master v11.0</h2>
    <p class="status" id="load-status">Файл не загружен</p>
    
    <div class="upload-zone" id="drop-zone">📥 ЗАГРУЗИТЕ PNG (ОДИН РАЗ)</div>
    <input type="file" id="file-input" accept="image/*" style="display:none">

    <div class="controls">
        <div>
            <label>Выпрямление: <span class="val" id="v-simplify">2.0</span></label>
            <input type="range" id="i-simplify" min="0.1" max="10" value="2.0" step="0.1">
        </div>
        <div>
            <label>Порог черного: <span class="val" id="v-th">128</span></label>
            <input type="range" id="i-th" min="10" max="240" value="128">
        </div>
        <div>
            <label>Удаление мусора: <span class="val" id="v-noise">10</span></label>
            <input type="range" id="i-noise" min="0" max="200" value="10">
        </div>
        <div>
            <label>Сглаживание углов: <span class="val" id="v-curve">ВКЛ</span></label>
            <input type="range" id="i-curve" min="0" max="1" value="1" step="1">
        </div>
    </div>

    <div class="btn-group">
        <button id="btn-process">⚡ ПРИМЕНИТЬ И СОЗДАТЬ</button>
        <button id="btn-download">💾 СКАЧАТЬ SVG</button>
    </div>

    <div id="preview">Превью обновится после нажатия кнопки</div>
</div>

<script>
    const fInput = document.getElementById('file-input');
    const dZone = document.getElementById('drop-zone');
    const bProcess = document.getElementById('btn-process');
    const bDownload = document.getElementById('btn-download');
    const loadStatus = document.getElementById('load-status');
    const preview = document.getElementById('preview');

    let originalImageData = null;
    let imgWidth = 0;
    let imgHeight = 0;
    let finalSVG = "";

    // Обновление цифр в интерфейсе
    const updateLabel = (iId, vId) => {
        document.getElementById(iId).oninput = e => {
            let val = e.target.value;
            if (iId === 'i-curve') val = val == 1 ? "ВКЛ" : "ВЫКЛ";
            document.getElementById(vId).innerText = val;
        };
    };
    ['i-simplify', 'i-th', 'i-noise', 'i-curve'].forEach(id => updateLabel(id, 'v-' + id.split('-')[1]));

    // 1. ЗАГРУЗКА И КЭШИРОВАНИЕ ФАЙЛА
    dZone.onclick = () => fInput.click();
    fInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                imgWidth = img.width;
                imgHeight = img.height;
                
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                
                originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                loadStatus.innerText = `Файл "${file.name}" готов в памяти. Меняйте ползунки!`;
                loadStatus.style.color = "#30d158";
                addLog("Изображение загружено.");
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    // 2. МАТЕМАТИЧЕСКИЕ ФУНКЦИИ
    function simplifyPath(pts, tol) {
        if (pts.length < 3) return pts;
        let dmax = 0, idx = 0;
        for (let i = 1; i < pts.length - 1; i++) {
            let d = Math.abs((pts[pts.length-1].y - pts[0].y) * pts[i].x - (pts[pts.length-1].x - pts[0].x) * pts[i].y + pts[pts.length-1].x * pts[0].y - pts[pts.length-1].y * pts[0].x) / Math.sqrt(Math.pow(pts[pts.length-1].y - pts[0].y, 2) + Math.pow(pts[pts.length-1].x - pts[0].x, 2));
            if (d > dmax) { idx = i; dmax = d; }
        }
        return dmax > tol ? simplifyPath(pts.slice(0, idx + 1), tol).concat(simplifyPath(pts.slice(idx), tol).slice(1)) : [pts[0], pts[pts.length-1]];
    }

    function getBezierPath(pts) {
        if (pts.length < 3) return pts.map(p => `L ${p.x} ${p.y}`).join(' ');
        let d = `M ${pts[0].x} ${pts[0].y}`;
        for (let i = 0; i < pts.length - 1; i++) {
            let p0 = pts[i], p1 = pts[i+1];
            d += ` Q ${p0.x} ${p0.y}, ${(p0.x + p1.x) / 2} ${(p0.y + p1.y) / 2}`;
        }
        d += ` L ${pts[pts.length-1].x} ${pts[pts.length-1].y}`;
        return d;
    }

    // 3. ОСНОВНОЙ ЦИКЛ ОБРАБОТКИ
    bProcess.onclick = function() {
        if (!originalImageData) return alert("Сначала загрузите картинку!");

        const th = parseInt(document.getElementById('i-th').value);
        const simplifyTol = parseFloat(document.getElementById('i-simplify').value);
        const noise = parseInt(document.getElementById('i-noise').value);
        const useBezier = document.getElementById('i-curve').value == 1;

        let visited = new Uint8Array(imgWidth * imgHeight);
        let fullPath = "";

        const isBlack = (x, y) => {
            if (x < 0 || x >= imgWidth || y < 0 || y >= imgHeight) return false;
            const i = (y * imgWidth + x) * 4;
            return (originalImageData[i] + originalImageData[i+1] + originalImageData[i+2]) / 3 < th;
        };

        for (let y = 0; y < imgHeight; y++) {
            for (let x = 0; x < imgWidth; x++) {
                if (isBlack(x, y) && !visited[y * imgWidth + x]) {
                    let pts = [];
                    let cx = x, cy = y, startX = x, startY = y, d = 0;
                    let dirs = [[1,0],[0,1],[-1,0],[0,-1]];
                    
                    do {
                        pts.push({x: cx, y: cy});
                        visited[cy * imgWidth + cx] = 1;
                        let found = false;
                        for (let i = 0; i < 4; i++) {
                            let nd = (d + i + 3) % 4;
                            if (isBlack(cx + dirs[nd][0], cy + dirs[nd][1])) {
                                cx += dirs[nd][0]; cy += dirs[nd][1]; d = nd;
                                found = true; break;
                            }
                        }
                        if (!found) break;
                    } while ((cx !== startX || cy !== startY) && pts.length < 100000);

                    if (pts.length > noise) {
                        let simplified = simplifyPath(pts, simplifyTol);
                        fullPath += (useBezier ? getBezierPath(simplified) : " M " + simplified.map(p => `${p.x} ${p.y}`).join(' L ')) + " Z ";
                    }
                }
            }
        }

        finalSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="${imgWidth}" height="${imgHeight}" viewBox="0 0 ${imgWidth} ${imgHeight}"><path d="${fullPath}" fill="black" stroke="black" stroke-width="0.3" stroke-linejoin="round"/></svg>`;
        preview.innerHTML = finalSVG;
        bDownload.style.display = "block";
    };

    bDownload.onclick = () => {
        const blob = new Blob([finalSVG], {type: 'image/svg+xml'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "result.svg";
        a.click();
    };
    
    function addLog(m) { console.log(m); }
</script>

</body>
</html>
