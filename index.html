<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Векторизатор Печатей + LOGS</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; width: 100%; max-width: 600px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .upload-area { border: 2px dashed #3498db; padding: 30px; border-radius: 10px; text-align: center; cursor: pointer; margin-bottom: 20px; background: #f8fbff; }
        .controls { display: grid; gap: 15px; margin-bottom: 20px; padding: 15px; background: #fafafa; border-radius: 8px; }
        label { display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; }
        input[type="range"] { width: 100%; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        #btn-process { background: #3498db; color: white; }
        #btn-download { background: #27ae60; color: white; display: none; }
        
        /* Стили лога */
        #log-container { margin-top: 20px; background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 8px; font-family: 'Courier New', Courier, monospace; font-size: 12px; max-height: 150px; overflow-y: auto; text-align: left; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #333; padding-bottom: 2px; }
        .log-success { color: #4ec9b0; }
        .log-error { color: #f44747; font-weight: bold; }
        .log-info { color: #569cd6; }

        #preview { margin-top: 20px; border: 1px solid #ddd; background: white; min-height: 100px; display: flex; justify-content: center; align-items: center; padding: 10px; }
        svg { max-width: 100%; height: auto; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0">Векторизатор v4 (с логами)</h2>
    
    <div class="upload-area" id="drop-zone">
        <span id="file-label">📁 Выберите или перетащите PNG/JPG</span>
        <input type="file" id="file-input" accept="image/*" style="display:none">
    </div>

    <div class="controls">
        <div>
            <label>Сглаживание: <span id="v-alpha">1.0</span></label>
            <input type="range" id="i-alpha" min="0" max="130" value="100">
        </div>
        <div>
            <label>Удаление мусора (размер): <span id="v-turd">3</span></label>
            <input type="range" id="i-turd" min="0" max="100" value="3">
        </div>
    </div>

    <button id="btn-process">🚀 ЗАПУСТИТЬ ВЕКТОРИЗАЦИЮ</button>
    <button id="btn-download">💾 СКАЧАТЬ SVG</button>

    <div id="preview">Превью будет здесь</div>

    <!-- Панель логов -->
    <div id="log-container">
        <div class="log-entry log-info">[Система]: Ожидание файла...</div>
    </div>
</div>

<script>
    const logContainer = document.getElementById('log-container');
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const btnProcess = document.getElementById('btn-process');
    const btnDownload = document.getElementById('btn-download');
    const preview = document.getElementById('preview');

    function addLog(text, type = 'info') {
        const entry = document.createElement('div');
        const time = new Date().toLocaleTimeString().split(' ')[0];
        entry.className = `log-entry log-${type}`;
        entry.innerHTML = `[${time}] ${text}`;
        logContainer.appendChild(entry);
        logContainer.scrollTop = logContainer.scrollHeight;
    }

    // Обновление цифр
    document.getElementById('i-alpha').oninput = e => document.getElementById('v-alpha').innerText = (e.target.value/100).toFixed(1);
    document.getElementById('i-turd').oninput = e => document.getElementById('v-turd').innerText = e.target.value;

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = () => {
        if(fileInput.files[0]) addLog(`Файл выбран: ${fileInput.files[0].name}`, 'success');
    };

    let finalSVG = "";

    btnProcess.onclick = async function() {
        const file = fileInput.files[0];
        if (!file) {
            addLog("ОШИБКА: Файл не выбран", "error");
            return;
        }

        addLog("Запуск процесса векторизации...", "info");

        // Проверка библиотеки
        if (typeof Potrace === 'undefined') {
            addLog("Попытка загрузки движка Potrace...", "info");
            const script = document.createElement('script');
            script.src = "https://cdn.jsdelivr.net/npm/potrace@1.1.2/dist/potrace.min.js";
            document.head.appendChild(script);
            
            script.onload = () => {
                addLog("Движок загружен успешно", "success");
                processImage(file);
            };
            script.onerror = () => addLog("КРИТИЧЕСКАЯ ОШИБКА: Не удалось загрузить скрипт. Проверьте интернет или GitHub блокировки.", "error");
        } else {
            processImage(file);
        }
    };

    function processImage(file) {
        const reader = new FileReader();
        addLog("Чтение данных изображения...", "info");
        
        reader.onload = function(e) {
            addLog("Изображение считано. Трассировка контуров...", "info");
            
            try {
                Potrace.loadImageFromUrl(e.target.result);
                Potrace.process(function() {
                    const options = {
                        alphaMax: parseFloat(document.getElementById('i-alpha').value / 100),
                        turdSize: parseInt(document.getElementById('i-turd').value),
                        optCurve: true
                    };

                    addLog(`Параметры: Alpha=${options.alphaMax}, Turd=${options.turdSize}`, "info");

                    Potrace.process(function() {
                        finalSVG = Potrace.getSVG(1);
                        preview.innerHTML = finalSVG;
                        btnDownload.style.display = "block";
                        addLog("УСПЕХ: Вектор создан и сглажен", "success");
                    }, options);
                });
            } catch (err) {
                addLog(`ОШИБКА ОБРАБОТКИ: ${err.message}`, "error");
            }
        };
        reader.readAsDataURL(file);
    }

    btnDownload.onclick = () => {
        const blob = new Blob([finalSVG], {type: 'image/svg+xml'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'pechat.svg';
        a.click();
        addLog("Файл сохранен в Загрузки", "success");
    };
</script>

</body>
</html>
