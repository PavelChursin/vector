<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ultra-Smooth Vector Stamp</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1b; color: #e8eaed; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #202124; padding: 30px; border-radius: 12px; width: 100%; max-width: 800px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .upload-zone { border: 2px dashed #8ab4f8; padding: 40px; text-align: center; border-radius: 8px; cursor: pointer; background: #292a2d; margin-bottom: 20px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #303134; padding: 20px; border-radius: 8px; }
        .group { display: flex; flex-direction: column; }
        label { font-size: 14px; margin-bottom: 8px; color: #8ab4f8; font-weight: bold; }
        input[type="range"] { width: 100%; accent-color: #8ab4f8; margin-bottom: 15px; }
        button { padding: 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 15px; }
        #btn-process { background: #8ab4f8; color: #202124; width: 100%; }
        #btn-download { background: #81c995; color: #202124; width: 100%; display: none; margin-top: 15px; }
        #preview { background: #fff; margin-top: 25px; border-radius: 8px; min-height: 400px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        svg { max-width: 100%; height: auto; }
        .val { float: right; color: #fff; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; margin-top:0;">Smooth Tracer 8.0</h2>
    
    <div class="upload-zone" id="drop-zone">Нажмите для загрузки PNG</div>
    <input type="file" id="file-input" accept="image/*" style="display:none">

    <div class="controls">
        <div class="group">
            <label>Гладкость (Игнорировать зазубрины): <span class="val" id="v-smooth">1.5</span></label>
            <input type="range" id="i-smooth" min="1" max="100" value="15">
            
            <label>Порог черного: <span class="val" id="v-th">128</span></label>
            <input type="range" id="i-th" min="10" max="240" value="128">
        </div>
        <div class="group">
            <label>Слияние мелких зазоров: <span class="val" id="v-merge">0</span></label>
            <input type="range" id="i-merge" min="0" max="10" value="0">
            
            <label>Минимальный размер детали: <span class="val" id="v-noise">5</span></label>
            <input type="range" id="i-noise" min="0" max="100" value="5">
        </div>
    </div>

    <button id="btn-process">⚡ СДЕЛАТЬ ЛИНИИ ИДЕАЛЬНЫМИ</button>
    <button id="btn-download">💾 СКАЧАТЬ ГЛАДКИЙ SVG</button>

    <div id="preview">Результат появится здесь</div>
</div>

<script>
    const fInput = document.getElementById('file-input');
    const dZone = document.getElementById('drop-zone');
    const bProcess = document.getElementById('btn-process');
    const bDownload = document.getElementById('btn-download');
    const preview = document.getElementById('preview');

    const updateLabel = (iId, vId, div = 1) => {
        document.getElementById(iId).oninput = e => {
            document.getElementById(vId).innerText = (e.target.value / div).toFixed(div === 1 ? 0 : 1);
        };
    };
    updateLabel('i-smooth', 'v-smooth', 10);
    updateLabel('i-th', 'v-th');
    updateLabel('i-merge', 'v-merge');
    updateLabel('i-noise', 'v-noise');

    dZone.onclick = () => fInput.click();

    let finalSVG = "";

    // Алгоритм Рамера-Дугласа-Пекера для выпрямления линий
    function simplifyPath(points, tolerance) {
        if (points.length < 3) return points;
        let dmax = 0, index = 0;
        for (let i = 1; i < points.length - 1; i++) {
            let d = perpendicularDistance(points[i], points[0], points[points.length - 1]);
            if (d > dmax) { index = i; dmax = d; }
        }
        if (dmax > tolerance) {
            let res1 = simplifyPath(points.slice(0, index + 1), tolerance);
            let res2 = simplifyPath(points.slice(index), tolerance);
            return res1.slice(0, res1.length - 1).concat(res2);
        } else {
            return [points[0], points[points.length - 1]];
        }
    }

    function perpendicularDistance(p, a, b) {
        let n = Math.abs((b.y - a.y) * p.x - (b.x - a.x) * p.y + b.x * a.y - b.y * a.x);
        let d = Math.sqrt(Math.pow(b.y - a.y, 2) + Math.pow(b.x - a.x, 2));
        return n / d;
    }

    bProcess.onclick = function() {
        const file = fInput.files[0];
        if (!file) return alert("Загрузите файл!");

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function(e) {
            const img = new Image();
            img.src = e.target.result;
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width; canvas.height = img.height;
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);

                const th = parseInt(document.getElementById('i-th').value);
                const tolerance = parseFloat(document.getElementById('i-smooth').value / 10);
                const merge = parseInt(document.getElementById('i-merge').value);
                const noise = parseInt(document.getElementById('i-noise').value);

                const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                
                // Трассировка
                let paths = "";
                let visited = new Uint8Array(canvas.width * canvas.height);

                for (let y = 0; y < canvas.height; y++) {
                    for (let x = 0; x < canvas.width; x++) {
                        let idx = y * canvas.width + x;
                        if (data[idx * 4] < th && !visited[idx]) {
                            let points = [];
                            let curX = x, curY = y;
                            
                            // Простейший алгоритм обхода контура
                            while (true) {
                                points.push({x: curX, y: curY});
                                visited[curY * canvas.width + curX] = 1;
                                
                                let found = false;
                                for (let dy = -1; dy <= 1; dy++) {
                                    for (let dx = -1; dx <= 1; dx++) {
                                        let nx = curX + dx, ny = curY + dy;
                                        if (nx >= 0 && nx < canvas.width && ny >= 0 && ny < canvas.height) {
                                            let nIdx = ny * canvas.width + nx;
                                            if (data[nIdx * 4] < th && !visited[nIdx]) {
                                                curX = nx; curY = ny; found = true; break;
                                            }
                                        }
                                    }
                                    if (found) break;
                                }
                                if (!found) break;
                            }

                            if (points.length > noise) {
                                // УПРОЩЕНИЕ: Превращаем зазубрины в ровные линии
                                let smoothPoints = simplifyPath(points, tolerance);
                                let d = `M${smoothPoints[0].x} ${smoothPoints[0].y} `;
                                for (let i = 1; i < smoothPoints.length; i++) {
                                    d += `L${smoothPoints[i].x} ${smoothPoints[i].y} `;
                                }
                                d += "Z";
                                paths += d;
                            }
                        }
                    }
                }

                finalSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="${canvas.width}" height="${canvas.height}" viewBox="0 0 ${canvas.width} ${canvas.height}">
                    <path d="${paths}" fill="black" stroke="black" stroke-width="${merge}" stroke-linejoin="round" stroke-linecap="round"/>
                </svg>`;
                
                preview.innerHTML = finalSVG;
                bDownload.style.display = "block";
            };
        };
    };

    bDownload.onclick = () => {
        const blob = new Blob([finalSVG], {type: 'image/svg+xml'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "ultra_smooth.svg";
        link.click();
    };
</script>

</body>
</html>
