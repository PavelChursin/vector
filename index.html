<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Super Smooth Bezier Vector</title>
    <style>
        body { font-family: sans-serif; background: #0f0f10; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1c1c1e; padding: 30px; border-radius: 20px; width: 100%; max-width: 850px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); border: 1px solid #333; }
        .upload-zone { border: 2px dashed #0a84ff; padding: 40px; text-align: center; border-radius: 15px; cursor: pointer; background: #252527; margin-bottom: 25px; transition: 0.3s; }
        .upload-zone:hover { background: #2c2c2e; border-color: #5eaeff; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; background: #2c2c2e; padding: 25px; border-radius: 15px; margin-bottom: 25px; }
        label { font-size: 13px; color: #0a84ff; font-weight: bold; margin-bottom: 10px; display: block; text-transform: uppercase; }
        input[type="range"] { width: 100%; accent-color: #0a84ff; cursor: pointer; }
        button { width: 100%; padding: 18px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 16px; text-transform: uppercase; }
        #btn-process { background: #0a84ff; color: white; margin-bottom: 12px; }
        #btn-download { background: #30d158; color: black; display: none; }
        #preview { background: #fff; margin-top: 25px; border-radius: 15px; min-height: 450px; display: flex; align-items: center; justify-content: center; padding: 15px; box-shadow: inset 0 0 20px rgba(0,0,0,0.1); overflow: hidden; }
        svg { max-width: 100%; height: auto; }
        .val { float: right; color: #fff; background: #0a84ff; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; margin-top:0; letter-spacing: 2px;">BEZIER SMOOTH v10.0</h2>
    
    <div class="upload-zone" id="drop-zone">🎯 ПЕРЕТАЩИТЕ PNG ДЛЯ ИДЕАЛЬНЫХ ЛИНИЙ</div>
    <input type="file" id="file-input" accept="image/*" style="display:none">

    <div class="controls">
        <div>
            <label>Выпрямление (Удаление углов): <span class="val" id="v-simplify">2.0</span></label>
            <input type="range" id="i-simplify" min="0.1" max="10" value="2.0" step="0.1">
        </div>
        <div>
            <label>Порог черного: <span class="val" id="v-th">128</span></label>
            <input type="range" id="i-th" min="10" max="240" value="128">
        </div>
        <div>
            <label>Слияние мелких деталей: <span class="val" id="v-noise">10</span></label>
            <input type="range" id="i-noise" min="0" max="200" value="10">
        </div>
        <div>
            <label>Плавность дуги: <span class="val" id="v-curve">ВКЛ</span></label>
            <input type="range" id="i-curve" min="0" max="1" value="1" step="1">
        </div>
    </div>

    <button id="btn-process">⚡ СОЗДАТЬ ПЛАВНЫЙ ВЕКТОР</button>
    <button id="btn-download">💾 СКАЧАТЬ ГЛАДКИЙ SVG</button>

    <div id="preview">Здесь будет ваш макет</div>
</div>

<script>
    const fInput = document.getElementById('file-input');
    const dZone = document.getElementById('drop-zone');
    const bProcess = document.getElementById('btn-process');
    const bDownload = document.getElementById('btn-download');
    const preview = document.getElementById('preview');

    const updateLabel = (iId, vId) => {
        document.getElementById(iId).oninput = e => {
            let val = e.target.value;
            if (iId === 'i-curve') val = val == 1 ? "ВКЛ" : "ВЫКЛ";
            document.getElementById(vId).innerText = val;
        };
    };
    ['i-simplify', 'i-th', 'i-noise', 'i-curve'].forEach(id => updateLabel(id, 'v-' + id.split('-')[1]));

    dZone.onclick = () => fInput.click();

    // Математика упрощения пути (Douglas-Peucker)
    function simplifyPath(points, tolerance) {
        if (points.length < 3) return points;
        let dmax = 0, index = 0;
        for (let i = 1; i < points.length - 1; i++) {
            let d = Math.abs((points[points.length-1].y - points[0].y) * points[i].x - (points[points.length-1].x - points[0].x) * points[i].y + points[points.length-1].x * points[0].y - points[points.length-1].y * points[0].x) / Math.sqrt(Math.pow(points[points.length-1].y - points[0].y, 2) + Math.pow(points[points.length-1].x - points[0].x, 2));
            if (d > dmax) { index = i; dmax = d; }
        }
        return dmax > tolerance ? simplifyPath(points.slice(0, index + 1), tolerance).concat(simplifyPath(points.slice(index), tolerance).slice(1)) : [points[0], points[points.length-1]];
    }

    // Построение кривых Безье по точкам
    function getBezierPath(points) {
        if (points.length < 3) return points.map(p => `L ${p.x} ${p.y}`).join(' ');
        let d = `M ${points[0].x} ${points[0].y}`;
        for (let i = 0; i < points.length - 1; i++) {
            let p0 = points[i], p1 = points[i+1];
            let midX = (p0.x + p1.x) / 2;
            let midY = (p0.y + p1.y) / 2;
            d += ` Q ${p0.x} ${p0.y}, ${midX} ${midY}`;
        }
        d += ` L ${points[points.length-1].x} ${points[points.length-1].y}`;
        return d;
    }

    let finalSVG = "";

    bProcess.onclick = function() {
        const file = fInput.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.src = e.target.result;
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width; canvas.height = img.height;
                ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);

                const th = parseInt(document.getElementById('i-th').value);
                const simplifyTol = parseFloat(document.getElementById('i-simplify').value);
                const noise = parseInt(document.getElementById('i-noise').value);
                const useBezier = document.getElementById('i-curve').value == 1;

                const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                const isBlack = (x, y) => {
                    if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) return false;
                    const i = (y * canvas.width + x) * 4;
                    return (data[i] + data[i+1] + data[i+2]) / 3 < th;
                };

                let visited = new Uint8Array(canvas.width * canvas.height);
                let fullPath = "";

                for (let y = 0; y < canvas.height; y++) {
                    for (let x = 0; x < canvas.width; x++) {
                        if (isBlack(x, y) && !visited[y * canvas.width + x]) {
                            let pts = [];
                            let cx = x, cy = y;
                            let startX = x, startY = y;
                            
                            // Трассировка контура (обход по границе)
                            let d = 0;
                            let dirs = [[1,0],[0,1],[-1,0],[0,-1]];
                            do {
                                pts.push({x: cx, y: cy});
                                visited[cy * canvas.width + cx] = 1;
                                let found = false;
                                for (let i = 0; i < 4; i++) {
                                    let nd = (d + i + 3) % 4;
                                    if (isBlack(cx + dirs[nd][0], cy + dirs[nd][1])) {
                                        cx += dirs[nd][0]; cy += dirs[nd][1]; d = nd;
                                        found = true; break;
                                    }
                                }
                                if (!found) break;
                            } while ((cx !== startX || cy !== startY) && pts.length < 100000);

                            if (pts.length > noise) {
                                // 1. Выпрямление линий (удаление лишних точек)
                                let simplified = simplifyPath(pts, simplifyTol);
                                // 2. Сглаживание дугами (Безье)
                                if (useBezier) {
                                    fullPath += getBezierPath(simplified) + " Z ";
                                } else {
                                    fullPath += " M " + simplified.map(p => `${p.x} ${p.y}`).join(' L ') + " Z ";
                                }
                            }
                        }
                    }
                }

                finalSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="${canvas.width}" height="${canvas.height}" viewBox="0 0 ${canvas.width} ${canvas.height}">
                    <path d="${fullPath}" fill="black" stroke="black" stroke-width="0.5" stroke-linejoin="round"/>
                </svg>`;
                preview.innerHTML = finalSVG;
                bDownload.style.display = "block";
            };
        };
        reader.readAsDataURL(file);
    };

    bDownload.onclick = () => {
        const blob = new Blob([finalSVG], {type: 'image/svg+xml'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "master_seal.svg";
        a.click();
    };
</script>

</body>
</html>
