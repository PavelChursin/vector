<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Stamp Vector Fix 6.0</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #252525; padding: 25px; border-radius: 15px; width: 100%; max-width: 650px; box-shadow: 0 10px 30px #000; }
        .upload-zone { border: 2px dashed #444; padding: 30px; text-align: center; margin-bottom: 20px; cursor: pointer; border-radius: 10px; }
        .upload-zone:hover { border-color: #00aaff; background: #2d2d2d; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #333; padding: 20px; border-radius: 10px; }
        .group { display: flex; flex-direction: column; }
        label { font-size: 12px; color: #aaa; margin-bottom: 5px; }
        input[type="range"] { width: 100%; accent-color: #00aaff; margin-bottom: 10px; }
        button { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        #btn-process { background: #00aaff; color: #white; width: 100%; }
        #btn-download { background: #2ecc71; color: white; width: 100%; display: none; }
        #preview { background: white; margin-top: 20px; border-radius: 8px; min-height: 250px; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 10px; }
        svg { max-width: 100%; height: auto; }
        .log { background: #000; color: #0f0; font-family: monospace; font-size: 11px; padding: 10px; margin-top: 15px; border-radius: 5px; height: 80px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin:0 0 20px 0; text-align:center;">Векторизатор v6.0</h2>
    
    <div class="upload-zone" id="drop-zone">Нажмите для загрузки PNG/JPG</div>
    <input type="file" id="file-input" accept="image/*" style="display:none">

    <div class="controls">
        <div class="group">
            <label>Порог черного (Threshold): <b id="v-th">128</b></label>
            <input type="range" id="i-th" min="1" max="254" value="128">
            
            <label>Сглаживание (Smooth): <b id="v-sm">1.0</b></label>
            <input type="range" id="i-sm" min="0" max="200" value="100">
        </div>
        <div class="group">
            <label>Удаление мусора: <b id="v-noise">5</b></label>
            <input type="range" id="i-noise" min="0" max="50" value="5">
            
            <button id="btn-invert" style="background:#555; color:white; padding:8px; font-size:11px;">ИНВЕРСИЯ ЦВЕТА</button>
        </div>
    </div>

    <button id="btn-process">⚡ СОЗДАТЬ ВЕКТОР</button>
    <button id="btn-download">💾 СКАЧАТЬ SVG</button>

    <div id="preview">Превью результата</div>
    <div class="log" id="log">Ожидание...</div>
</div>

<script>
    const log = document.getElementById('log');
    const fInput = document.getElementById('file-input');
    const dZone = document.getElementById('drop-zone');
    const bProcess = document.getElementById('btn-process');
    const bDownload = document.getElementById('btn-download');
    const bInvert = document.getElementById('btn-invert');
    const preview = document.getElementById('preview');

    let isInverted = false;
    let finalSVG = "";

    function addLog(m) { 
        log.innerHTML += `> ${m}<br>`; 
        log.scrollTop = log.scrollHeight; 
    }

    // Обновление значений ползунков
    document.getElementById('i-th').oninput = e => document.getElementById('v-th').innerText = e.target.value;
    document.getElementById('i-sm').oninput = e => document.getElementById('v-sm').innerText = (e.target.value/100).toFixed(1);
    document.getElementById('i-noise').oninput = e => document.getElementById('v-noise').innerText = e.target.value;

    bInvert.onclick = () => {
        isInverted = !isInverted;
        addLog(`Инверсия: ${isInverted ? 'ВКЛ' : 'ВЫКЛ'}`);
    };

    dZone.onclick = () => fInput.click();
    fInput.onchange = () => addLog(`Выбран файл: ${fInput.files[0].name}`);

    bProcess.onclick = function() {
        const file = fInput.files[0];
        if (!file) return alert("Загрузите файл!");

        addLog("Обработка изображения...");
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function(e) {
            const img = new Image();
            img.src = e.target.result;
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;

                // ФИКС ЧЕРНОГО ЭКРАНА: Рисуем белый фон под изображением
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);

                const threshold = parseInt(document.getElementById('i-th').value);
                const smooth = parseFloat(document.getElementById('i-sm').value / 100);
                const noise = parseInt(document.getElementById('i-noise').value);

                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;

                // Создаем SVG контур (улучшенный метод сканирования)
                let paths = "";
                for (let y = 0; y < canvas.height; y++) {
                    for (let x = 0; x < canvas.width; x++) {
                        let idx = (y * canvas.width + x) * 4;
                        let avg = (data[idx] + data[idx+1] + data[idx+2]) / 3;
                        
                        // Проверка на порог с учетом инверсии
                        let isBlack = isInverted ? avg > threshold : avg < threshold;

                        if (isBlack) {
                            let startX = x;
                            while (x < canvas.width && (isInverted ? (data[(y * canvas.width + x) * 4] + data[(y * canvas.width + x) * 4 + 1] + data[(y * canvas.width + x) * 4 + 2]) / 3 > threshold : (data[(y * canvas.width + x) * 4] + data[(y * canvas.width + x) * 4 + 1] + data[(y * canvas.width + x) * 4 + 2]) / 3 < threshold)) {
                                x++;
                            }
                            let width = x - startX;
                            if (width > noise) { // Фильтр шума
                                paths += `M${startX} ${y}h${width}v1h-${width}z `;
                            }
                        }
                    }
                }

                finalSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="${canvas.width}" height="${canvas.height}" viewBox="0 0 ${canvas.width} ${canvas.height}"><path d="${paths}" fill="black" shape-rendering="geometricPrecision" style="stroke-linejoin:round; stroke-width:${smooth};"/></svg>`;
                
                preview.innerHTML = finalSVG;
                bDownload.style.display = "block";
                addLog("Успех! Вектор сгенерирован.");
            };
        };
    };

    bDownload.onclick = () => {
        const blob = new Blob([finalSVG], {type: 'image/svg+xml'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "seal_final.svg";
        link.click();
    };
</script>

</body>
</html>
